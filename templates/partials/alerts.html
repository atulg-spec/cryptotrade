{% if messages %}
<div class="mb-4 space-y-2">
  {% for message in messages %}
  <div class="rounded-xl border px-3 py-2 text-sm {% if message.tags == 'error' %}border-rose-500/30 bg-rose-500/10 text-rose-300{% elif message.tags == 'success' %}border-emerald-500/30 bg-emerald-500/10 text-emerald-300{% else %}border-blue-500/30 bg-blue-500/10 text-blue-300{% endif %}">
    {{ message }}
  </div>
  {% endfor %}
</div>
{% endif %}
