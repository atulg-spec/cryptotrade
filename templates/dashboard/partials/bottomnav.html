{% load humanize %}

        <!-- Dashboard -->
        <li>
            <a href="{% url 'dashboard' %}"
                class="flex flex-col items-center justify-center gap-1 py-2 px-3 {% if request.resolver_match.url_name == 'dashboard' %}text-blue-400{% else %}text-slate-500{% endif %} transition-colors">
                <span class="text-[10px] font-medium">Home</span>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"/>
                </svg>
            </a>
        </li>

        <!-- Watchlist -->
        <li>
            <a href="{% url 'watchlist' %}"
                class="flex flex-col items-center justify-center gap-1 py-2 px-3 {% if request.resolver_match.url_name == 'watchlist' %}text-blue-400{% else %}text-slate-500{% endif %} transition-colors">
                <span class="text-[10px] font-medium">Watchlist</span>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
                </svg>
            </a>
        </li>

        <!-- Quick Trade Button (Center) -->

            <a href="#"
                class="flex flex-col items-center justify-center -mt-4">
                <span class="text-[10px] font-medium text-slate-400 mb-1">Trade</span>
                <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                    </svg>
                </div>
            </a>
        </li>

        <!-- Orders -->
        <li>
            <a href="{% url 'orders' %}"
                class="flex flex-col items-center justify-center gap-1 py-2 px-3 {% if request.resolver_match.url_name == 'orders' %}text-blue-400{% else %}text-slate-500{% endif %} transition-colors">
                <span class="text-[10px] font-medium">Orders</span>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
            </a>
        </li>

        <!-- Profile -->
        <li>
            <a href="{% url 'profile' %}"
                class="flex flex-col items-center justify-center gap-1 py-2 px-3 {% if request.resolver_match.url_name == 'profile' %}text-blue-400{% else %}text-slate-500{% endif %} transition-colors">
                <span class="text-[10px] font-medium">Profile</span>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>

</nav>

<!-- Add padding at bottom of pages to account for both bottom navbars -->
<style>
    .safe-area-bottom {
        padding-bottom: env(safe-area-inset-bottom, 0);
    }
    
    /* Stack both navbars properly - primary nav at bottom, secondary nav above it */
    @media (max-width: 767px) {
        /* Primary global navbar - fixed at very bottom */
        nav.fixed.bottom-0.z-40 {
            bottom: 0;
            z-index: 40;
        }
        
        /* Secondary dashboard navbar - fixed just above primary */
        .mob-nav {
            position: fixed;
            bottom: 64px; /* Height of primary nav (h-16 = 64px) */
            left: 0;
            right: 0;
            z-index: 39;
            display: flex;
        }
        
        /* Add bottom padding to main content to account for both navbars */
        main, .main-content, body {
            padding-bottom: calc(64px + 56px); /* primary nav + secondary nav */
        }
    }
</style>
