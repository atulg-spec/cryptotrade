{% load humanize static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="csrf-token" content="{{ csrf_token }}" />
    <title>Trading Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; margin: 0; padding: 0; }
        /* Custom scrollbars */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }
        
        .up-color { color: #10b981; }
        .down-color { color: #ef4444; }
        .bg-up-color { background-color: #10b981; }
        .bg-down-color { background-color: #ef4444; }
    </style>
    <!-- TradingView Widget -->
    <script src="https://s3.tradingview.com/tv.js"></script>
    <!-- Core JS Loaders -->
    <script src="{% static 'assets/js/notifications.js' %}?v=2" defer></script>
    <script src="{% static 'assets/js/websocket.js' %}?v=2" defer></script>
    <script src="{% static 'assets/js/chart.js' %}?v=2" defer></script>
    <script src="{% static 'assets/js/watchlist.js' %}?v=2" defer></script>
    <script src="{% static 'assets/js/orderbook.js' %}?v=3" defer></script>
    <script src="{% static 'assets/js/trading.js' %}?v=3" defer></script>
</head>
<style>
    .tab-active {
        background: #1e3a5f;
        color: white;
    }
</style>

<body class="flex items-center justify-center min-h-screen">

    <div class="w-full overflow-hidden min-h-screen"
        style="background:#121520; border:1px solid rgba(255,255,255,0.08);">
        {% block body %}
        {% endblock %}
        
        <!-- ── BOTTOM NAV ── -->
        {% include 'dashboard/partials/bottomnav.html' %}
    </div>

    <script>
        // Sync chevron rotation with panel visibility
        document.querySelectorAll('#active-row').forEach(row => {
            row.addEventListener('click', () => {
                const panel = row.nextElementSibling;
                const chevron = row.querySelector('#chevron-ftse');
                panel.classList.toggle('hidden');
                chevron.style.transform = panel.classList.contains('hidden') ? '' : 'rotate(180deg)';
            });
        });
    </script>
</body>

</html>
