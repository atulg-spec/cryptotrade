    <meta name="theme-color" content="#111827">
    <title>{{site_settings.site_name}} - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: {
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                            600: '#475569',
                            500: '#64748b',
                            400: '#94a3b8',
                            300: '#cbd5e1',
                            200: '#e2e8f0',
                            100: '#f1f5f9',
                        },
                        blue: {
                            600: '#2563eb',
                            500: '#3b82f6',
                        },
                        green: {
                            600: '#16a34a',
                            500: '#22c55e',
                        },
                        red: {
                            600: '#dc2626',
                            500: '#ef4444',
                        }
                    }
                }
            }
        }
    })
    </script>
</head>

<body class="bg-gray-900 text-gray-100 font-sans">

    <div class="flex h-screen">

            <main class="flex-1 overflow-y-auto p-4 md:p-6">
