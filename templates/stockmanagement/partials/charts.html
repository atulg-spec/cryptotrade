<script src="https://s3.tradingview.com/tv.js"></script>

<!-- FULLSCREEN MODAL -->
<div id="chartModal"
     class="fixed inset-0 z-[9999] hidden items-center justify-center bg-black/80 backdrop-blur-sm">

    <!-- Modal Container -->
    <div class="relative w-full h-[90%] max-w-7xl bg-black shadow-2xl flex flex-col">

        <!-- Header -->
        <div class="flex items-center justify-between py-2">

            <div id="chart-symbol-name"
                 class="text-white text-lg font-bold px-2">
            </div>

            <!-- CLOSE BUTTON -->
            <button onclick="closeChart()"
                class="w-9 h-9 flex items-center justify-center rounded-lg bg-red-500/10 hover:bg-red-500/20 border border-red-500/30 transition">

                <svg class="w-5 h-5 text-red-400"
                     fill="none"
                     stroke="currentColor"
                     viewBox="0 0 24 24">

                    <path stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M6 18L18 6M6 6l12 12"/>
                </svg>

            </button>

        </div>

        <!-- Chart -->
        <div id="tradingview_chart"
             class="flex-1">
        </div>

    </div>

</div>

<script>

let tradingViewWidget = null;
let currentSymbol = null;

function openChart(stockItem)
{
    if (!stockItem) return;

    const symbol = stockItem.dataset.symbol;
    const name = stockItem.dataset.name;

    if (!symbol) return;

    currentSymbol = symbol;

    const modal = document.getElementById("chartModal");
    const chart = document.getElementById("tradingview_chart");
    const title = document.getElementById("chart-symbol-name");

    if (!modal || !chart) {
        console.error("Chart modal not found");
        return;
    }

    // Show modal
    modal.classList.remove("hidden");
    modal.classList.add("flex");

    // Lock background scroll
    document.body.style.overflow = "hidden";

    // Set title
    title.textContent = `${symbol} • ${name}`;

    // Clear old chart
    chart.innerHTML = "";

    // Create new widget
    tradingViewWidget = new TradingView.widget({
        width: "100%",
        height: "100%",
        symbol: formatSymbol(symbol),
        interval: "1",
        timezone: "Asia/Kolkata",
        theme: "dark",
        style: "1",
        locale: "en",
        toolbar_bg: "#000000",
        enable_publishing: false,
        allow_symbol_change: false,
        container_id: "tradingview_chart",

        backgroundColor: "#000000",
        gridColor: "rgba(255,255,255,0.06)",

        hide_top_toolbar: false,
        hide_side_toolbar: false,
        hide_legend: false,

        details: true,
        hotlist: false,
        calendar: false,

        save_image: false
    });
}


function closeChart()
{
    const modal = document.getElementById("chartModal");
    const chart = document.getElementById("tradingview_chart");

    modal.classList.add("hidden");
    modal.classList.remove("flex");

    document.body.style.overflow = "auto";

    if (chart)
        chart.innerHTML = "";

    tradingViewWidget = null;
}


// Close on outside click
document.getElementById("chartModal").addEventListener("click", function(e)
{
    if (e.target === this)
        closeChart();
});


// ESC key close
document.addEventListener("keydown", function(e)
{
    if (e.key === "Escape")
        closeChart();
});


function formatSymbol(symbol)
{
    symbol = symbol.toUpperCase();

    if (symbol.endsWith("USDT"))
        return `BINANCE:${symbol}`;

    return `NSE:${symbol}`;
}

</script>
