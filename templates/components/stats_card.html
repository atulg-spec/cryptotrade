{% comment %}
Stats Card Component
Usage: {% include "components/stats_card.html" with label="Total Assets" value=total_equity change=change_pct change_positive=True %}
{% endcomment %}
<div class="flex flex-col gap-0.5">
  <span class="text-[10px] font-mono font-bold uppercase tracking-widest text-slate-500">{{ label }}</span>
  <span class="font-mono text-sm font-semibold
    {% if color == 'green' %}text-emerald-400
    {% elif color == 'red' %}text-rose-400
    {% else %}text-white{% endif %}">
    {{ value }}
  </span>
  {% if change %}
  <span class="font-mono text-[10px] {% if change_positive %}text-emerald-400{% else %}text-rose-400{% endif %}">
    {{ change }}
  </span>
  {% endif %}
</div>
