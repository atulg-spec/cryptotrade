<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forex Live · real-time stream (Binance)</title>
  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* price flash animations */
    .flash-green { background-color: #10b981 !important; transition: background-color 0.15s ease; }
    .flash-red { background-color: #ef4444 !important; transition: background-color 0.15s ease; }
    .dot-connected { background-color: #10b981; box-shadow: 0 0 6px #10b981; }
    .dot-disconnected { background-color: #b91c1c; box-shadow: 0 0 4px #b91c1c; }
    td { transition: background-color 0.1s ease; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased">

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <!-- top navbar -->
    <div class="flex flex-wrap items-center justify-between mb-8 pb-2 border-b border-gray-700">
      <h1 class="text-3xl font-semibold tracking-tight bg-gradient-to-r from-teal-200 to-emerald-300 bg-clip-text text-transparent">
        Forex Live Prices
      </h1>
      <div class="flex items-center space-x-3 bg-gray-800/70 backdrop-blur-sm py-2 px-5 rounded-full shadow-md">
        <span class="text-sm font-medium text-gray-300">status</span>
        <div id="connectionDot" class="w-3 h-3 rounded-full dot-connected transition-all duration-300"></div>
        <span id="connectionText" class="text-sm font-semibold text-emerald-300">Connected</span>
      </div>
    </div>

    <!-- price table -->
    <div class="overflow-x-auto rounded-2xl border border-gray-700/50 shadow-2xl bg-gray-800/40 backdrop-blur-sm">
      <table class="min-w-full table-auto text-sm">
        <thead class="bg-gray-800 text-gray-300 text-xs uppercase tracking-wider border-b border-gray-700">
          <tr>
            <th class="px-5 py-4 text-left font-medium">Symbol</th>
            <th class="px-5 py-4 text-left font-medium">Price (USDT)</th>
            <th class="px-5 py-4 text-left font-medium">24h Change %</th>
            <th class="px-5 py-4 text-left font-medium">24h High</th>
            <th class="px-5 py-4 text-left font-medium">24h Low</th>
            <th class="px-5 py-4 text-left font-medium">Status</th>
          </tr>
        </thead>
        <tbody id="priceTableBody" class="divide-y divide-gray-700/50"></tbody>
      </table>
    </div>

    <!-- loading overlay -->
    <div id="loadingOverlay" class="flex justify-center items-center py-12 text-gray-500 text-sm">
      <div class="animate-pulse flex space-x-2">
        <div class="w-2 h-2 bg-emerald-500 rounded-full"></div>
        <div class="w-2 h-2 bg-emerald-500 rounded-full"></div>
        <div class="w-2 h-2 bg-emerald-500 rounded-full"></div>
        <span class="ml-2">connecting to Binance streams ...</span>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ==================== MODULE: Symbol Registry ====================
      const SymbolRegistry = {
        // All required forex symbols in lowercase for Binance
        symbols: [
          'eurusdt', 'gbpusdt', 'audusdt', 'nzdusdt', 'usdcusdt', 
          'fdusdusdt', 'tryusdt', 'brlusdt', 'rubusdt', 'uahusdt', 
          'zarusdt', 'plnusdt', 'ronusdt', 'chfusdt', 'cadusdt', 'jpyusdt'
        ],
        
        getAll() {
          return [...this.symbols];
        },
        
        getStreamNames() {
          return this.symbols.map(s => `${s}@ticker`);
        }
      };

      // ==================== MODULE: State Manager ====================
      const StateManager = {
        prices: new Map(),
        callbacks: new Set(),
        pendingUpdate: false,
        
        subscribe(cb) {
          this.callbacks.add(cb);
        },
        
        unsubscribe(cb) {
          this.callbacks.delete(cb);
        },
        
        setSymbolData(symbol, ticker) {
          const old = this.prices.get(symbol);
          const newPrice = parseFloat(ticker.c);
          const oldPrice = old ? old.lastPriceRaw : newPrice;
          
          this.prices.set(symbol, {
            symbol: symbol,
            price: newPrice.toFixed(5),
            changePercent: parseFloat(ticker.P).toFixed(2),
            high: parseFloat(ticker.h).toFixed(5),
            low: parseFloat(ticker.l).toFixed(5),
            lastPriceRaw: newPrice,
            prevPriceRaw: oldPrice
          });
          
          this.notify();
        },
        
        notify() {
          if (this.pendingUpdate) return;
          this.pendingUpdate = true;
          
          requestAnimationFrame(() => {
            this.callbacks.forEach(cb => {
              try {
                cb(this.prices);
              } catch (e) {
                console.error('Callback error:', e);
              }
            });
            this.pendingUpdate = false;
          });
        },
        
        getState() {
          return this.prices;
        }
      };

      // ==================== MODULE: WebSocket Manager ====================
      const WebSocketManager = {
        ws: null,
        manualClose: false,
        reconnectTimer: null,
        reconnectDelay: 2500,
        
        connect() {
          if (this.ws && this.ws.readyState === WebSocket.OPEN) return;
          
          const streams = SymbolRegistry.getStreamNames().join('/');
          const url = `wss://stream.binance.com:9443/stream?streams=${streams}`;
          
          console.log('Connecting to Binance...');
          this.ws = new WebSocket(url);
          
          this.ws.onopen = () => {
            console.log('WebSocket connected');
            this.manualClose = false;
            ConnectionUI.updateStatus(true);
            this.hideLoading();
          };
          
          this.ws.onmessage = (event) => {
            try {
              const msg = JSON.parse(event.data);
              if (msg.data && msg.data.e === '24hrTicker') {
                const symbol = msg.data.s.toLowerCase();
                StateManager.setSymbolData(symbol, msg.data);
                this.hideLoading();
              }
            } catch (e) {
              console.warn('Message parse error:', e);
            }
          };
          
          this.ws.onerror = (error) => {
            console.error('WebSocket error:', error);
            ConnectionUI.updateStatus(false);
          };
          
          this.ws.onclose = () => {
            console.log('WebSocket closed');
            ConnectionUI.updateStatus(false);
            
            if (!this.manualClose) {
              this.scheduleReconnect();
            }
          };
        },
        
        scheduleReconnect() {
          if (this.reconnectTimer) clearTimeout(this.reconnectTimer);
          this.reconnectTimer = setTimeout(() => {
            console.log('Attempting to reconnect...');
            this.connect();
          }, this.reconnectDelay);
        },
        
        hideLoading() {
          const overlay = document.getElementById('loadingOverlay');
          if (overlay && StateManager.prices.size > 0) {
            overlay.style.display = 'none';
          }
        },
        
        disconnect() {
          this.manualClose = true;
          if (this.reconnectTimer) {
            clearTimeout(this.reconnectTimer);
            this.reconnectTimer = null;
          }
          if (this.ws) {
            this.ws.close();
            this.ws = null;
          }
          ConnectionUI.updateStatus(false);
        },
        
        start() {
          this.connect();
        }
      };

      // ==================== MODULE: Connection UI ====================
      const ConnectionUI = {
        dot: document.getElementById('connectionDot'),
        text: document.getElementById('connectionText'),
        
        updateStatus(connected) {
          if (!this.dot || !this.text) return;
          
          if (connected) {
            this.dot.className = 'w-3 h-3 rounded-full dot-connected';
            this.text.innerText = 'Connected';
            this.text.className = 'text-sm font-semibold text-emerald-300';
          } else {
            this.dot.className = 'w-3 h-3 rounded-full dot-disconnected';
            this.text.innerText = 'Disconnected';
            this.text.className = 'text-sm font-semibold text-rose-300';
          }
        }
      };

      // ==================== MODULE: UI Renderer ====================
      const UIRenderer = {
        tbody: document.getElementById('priceTableBody'),
        rowMap: new Map(),
        
        init() {
          this.buildTable();
        },
        
        buildTable() {
          if (!this.tbody) return;
          this.tbody.innerHTML = '';
          
          SymbolRegistry.getAll().forEach(symbol => {
            const row = this.createRow(symbol);
            this.tbody.appendChild(row);
            this.rowMap.set(symbol, row);
          });
        },
        
        createRow(symbol) {
          const tr = document.createElement('tr');
          tr.className = 'border-b border-gray-700/40 hover:bg-gray-700/30 transition-colors';
          tr.setAttribute('data-symbol', symbol);
          
          tr.innerHTML = `
            <td class="px-5 py-3 font-mono text-sm font-medium text-cyan-200">${symbol.toUpperCase()}</td>
            <td class="px-5 py-3 price-col font-mono text-base text-gray-100">—</td>
            <td class="px-5 py-3 change-col font-mono">—</td>
            <td class="px-5 py-3 high-col font-mono text-gray-300">—</td>
            <td class="px-5 py-3 low-col font-mono text-gray-300">—</td>
            <td class="px-5 py-3 dot-col"><span class="inline-block w-2.5 h-2.5 rounded-full bg-gray-600"></span></td>
          `;
          return tr;
        },
        
        update(stateMap) {
          SymbolRegistry.getAll().forEach(symbol => {
            const row = this.rowMap.get(symbol);
            if (!row) return;
            
            const data = stateMap.get(symbol);
            if (!data) {
              this.renderEmptyRow(row);
              return;
            }
            
            this.renderDataRow(row, data);
          });
        },
        
        renderEmptyRow(row) {
          const priceCell = row.querySelector('.price-col');
          const changeCell = row.querySelector('.change-col');
          const highCell = row.querySelector('.high-col');
          const lowCell = row.querySelector('.low-col');
          const dotCell = row.querySelector('.dot-col span');
          
          if (priceCell) priceCell.textContent = '—';
          if (changeCell) changeCell.textContent = '—';
          if (highCell) highCell.textContent = '—';
          if (lowCell) lowCell.textContent = '—';
          if (dotCell) dotCell.className = 'inline-block w-2.5 h-2.5 rounded-full bg-gray-600';
        },
        
        renderDataRow(row, data) {
          const priceCell = row.querySelector('.price-col');
          const changeCell = row.querySelector('.change-col');
          const highCell = row.querySelector('.high-col');
          const lowCell = row.querySelector('.low-col');
          const dotCell = row.querySelector('.dot-col span');
          
          // Update price with flash effect
          if (priceCell && priceCell.textContent !== data.price) {
            priceCell.textContent = data.price;
            
            // Add flash effect
            if (data.lastPriceRaw > data.prevPriceRaw) {
              priceCell.classList.add('flash-green');
              setTimeout(() => priceCell.classList.remove('flash-green'), 200);
            } else if (data.lastPriceRaw < data.prevPriceRaw) {
              priceCell.classList.add('flash-red');
              setTimeout(() => priceCell.classList.remove('flash-red'), 200);
            }
          }
          
          // Update change percentage with color
          if (changeCell) {
            changeCell.textContent = `${data.changePercent}%`;
            const changeValue = parseFloat(data.changePercent);
            if (changeValue >= 0) {
              changeCell.className = 'px-5 py-3 change-col font-mono text-emerald-400';
            } else {
              changeCell.className = 'px-5 py-3 change-col font-mono text-rose-400';
            }
          }
          
          // Update high/low
          if (highCell) highCell.textContent = data.high;
          if (lowCell) lowCell.textContent = data.low;
          
          // Update status dot
          if (dotCell) {
            dotCell.className = 'inline-block w-2.5 h-2.5 rounded-full bg-emerald-400 animate-pulse';
          }
        }
      };

      // ==================== Initialize Application ====================
      function init() {
        // Subscribe renderer to state changes
        StateManager.subscribe((stateMap) => {
          UIRenderer.update(stateMap);
        });
        
        // Build initial table
        UIRenderer.init();
        
        // Start WebSocket connection
        WebSocketManager.start();
        
        console.log('Forex dashboard initialized');
      }

      // Start when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
